<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ job.title }} | JobMatch AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e1a; --surface: #111827; --surface2: #162032;
            --border: #1e2d45; --accent: #3b82f6; --accent2: #06b6d4;
            --text: #e2e8f0; --muted: #64748b; --success: #34d399;
        }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.12; pointer-events: none; }
        .orb-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; right: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #06b6d4; bottom: -100px; left: -100px; }
        .card {
            position: relative; z-index: 10;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 48px;
            width: 100%; max-width: 560px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--muted); text-decoration: none;
            font-size: 13px; font-weight: 600; margin-bottom: 28px; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }
        .company-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.25);
            color: var(--accent2); padding: 5px 14px; border-radius: 100px;
            font-size: 12px; font-weight: 600; margin-bottom: 14px;
        }
        h2 { font-size: 28px; font-weight: 700; line-height: 1.2; color: var(--text); }
        .divider { height: 1px; background: var(--border); margin: 24px 0; }
        .section-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--muted); margin-bottom: 12px;
        }
        .skills-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .skill-tag {
            background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
            color: var(--accent); padding: 6px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
        }
        .info-box {
            background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.2);
            border-radius: 10px; padding: 14px 16px; margin-top: 20px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .info-box p { font-size: 13px; color: var(--success); line-height: 1.5; }
        .btn-row { display: flex; gap: 12px; margin-top: 32px; }
        .btn {
            flex: 1; padding: 13px; border-radius: 10px;
            font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600;
            text-align: center; text-decoration: none; cursor: pointer; border: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
        <a href="/" class="back-link">← Back to Jobs</a>
        <div class="company-badge">🏢 {{ job.company }}</div>
        <h2>{{ job.title }}</h2>
        <div class="divider"></div>
        <div class="section-label">Required Skills</div>
        <div class="skills-row">
            {% for skill in job.skills.split() %}
            <span class="skill-tag">{{ skill }}</span>
            {% endfor %}
        </div>
        <div class="info-box">
            <span>✦</span>
            <p>Your interest has been recorded. Our AI engine is updating your personalized recommendations.</p>
        </div>
        <div class="btn-row">
            <a href="/recommendations" class="btn btn-primary">View My Recommendations</a>
            <a href="/" class="btn btn-ghost">Browse More Jobs</a>
        </div>
    </div>
</body>
</html>
