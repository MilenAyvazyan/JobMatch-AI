<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | JobMatch AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e1a; --surface: #111827; --border: #1e2d45;
            --accent: #3b82f6; --accent2: #06b6d4;
            --text: #e2e8f0; --muted: #64748b; --error: #f87171;
        }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(40px)} }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
        .orb-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
        .orb-2 { width: 300px; height: 300px; background: #06b6d4; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }
        .card {
            position: relative; z-index: 10;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 48px 44px;
            width: 100%; max-width: 420px;
            box-shadow: 0 0 0 1px rgba(59,130,246,0.1), 0 32px 64px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .logo-text {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
        label {
            display: block; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 8px;
        }
        .input-wrap { position: relative; margin-bottom: 20px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 13px 16px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: 'Sora', sans-serif; font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .password-input { padding-right: 44px; }
        .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 16px; padding: 0; transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--text); }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white; border: none; border-radius: 10px;
            font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.99); }
        .link-row { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
        .link-row a { color: var(--accent2); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .link-row a:hover { color: var(--text); }
        .error-box {
            background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
            color: var(--error); padding: 12px 16px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">💼</div>
            <span class="logo-text">JobMatch AI</span>
        </div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>
        {% if error %}
        <div class="error-box">⚠ {{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Username</label>
            <div class="input-wrap">
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" name="password" id="pwd" class="password-input" required placeholder="••••••••">
                <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
            </div>
            <button type="submit" class="btn">Sign In →</button>
        </form>
        <div class="link-row">
            Don't have an account? <a href="/register">Register now</a>
        </div>
    </div>
    <script>
        function togglePwd() {
            const i = document.getElementById('pwd');
            i.type = i.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
